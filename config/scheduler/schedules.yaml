# Prefect cron schedule definitions

flows:
  morning_briefing:
    cron: "0 7 * * 1-5"       # Weekdays at 7:00 AM
    description: "Daily morning briefing pipeline"
    enabled: false             # Epic 4 scope — not yet implemented

  crawler_vietstock:
    cron: "0 6,12,18 * * *"   # 3x daily
    description: "Vietstock news crawler"
    enabled: true

  crawler_cafef:
    cron: "0 6,12,18 * * *"
    description: "CafeF news crawler"
    enabled: true

  crawler_vneconomy:
    cron: "0 7,13,19 * * *"
    description: "VnEconomy news crawler"
    enabled: true

  stock_crawl:
    cron: "0 10 * * 1-5"       # 10:00 UTC = 17:00 VN (after market close)
    description: "Stock price history crawl - weekdays after market close"
    enabled: true

  technical_indicators:
    cron: "30 10 * * 1-5"      # 10:30 UTC = 17:30 VN (after stock_crawl completes)
    description: "Technical indicator calculation - weekdays after stock crawl"
    enabled: true

  data_cleanup:
    cron: "0 2 * * *"          # Daily at 2:00 AM
    description: "30-day rolling window cleanup"
    enabled: true
