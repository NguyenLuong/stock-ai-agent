# Prefect cron schedule definitions
# All cron expressions are in UTC. Vietnam Time (VNT) = UTC+7.

flows:
  morning_briefing:
    cron: "0 0 * * 1-5"       # 00:00 UTC = 07:00 VNT
    description: "Daily morning briefing pipeline"
    enabled: false             # Epic 4 scope — not yet implemented

  news_crawl:
    cron: "0 23,5,11 * * *"   # 23:00/05:00/11:00 UTC = 06:00/12:00/18:00 VNT
    description: "News crawl (all sources) + embedding"
    enabled: true

  stock_pipeline:
    cron: "0 10 * * 1-5"      # 10:00 UTC = 17:00 VNT (after market close)
    description: "Stock price crawl + technical indicators"
    enabled: true

  data_cleanup:
    cron: "0 19 * * *"        # 19:00 UTC = 02:00 VNT (next day)
    description: "30-day rolling window cleanup"
    enabled: true
