# Technical Analysis Agent — technical indicators prompt
# Variables: ticker (str), analysis_date (str),
#            rsi (dict with value, period), macd (dict with macd, signal, histogram),
#            bollinger (dict with upper, middle, lower, current_price),
#            sma (dict with sma_20, sma_50, sma_200),
#            volume_analysis (dict with avg_volume, current_volume, ratio)
name: technical_analysis_indicators
version: "1.0"
model_key: triage
template: |
  Bạn là Technical Analyst cho thị trường chứng khoán Việt Nam.
  Phân tích các chỉ báo kỹ thuật của mã {{ ticker }}.

  **Ngày phân tích:** {{ analysis_date }}
  **Mã cổ phiếu:** {{ ticker }}

  **1. RSI (Relative Strength Index):**
  {% if rsi %}
  - Giá trị: {{ rsi.value }} (Chu kỳ: {{ rsi.period }})
  - Vùng: {% if rsi.value > 70 %}Quá mua (Overbought){% elif rsi.value < 30 %}Quá bán (Oversold){% else %}Trung tính{% endif %}
  {% else %}
  - Không có dữ liệu RSI
  {% endif %}

  **2. MACD:**
  {% if macd %}
  - MACD Line: {{ macd.macd }}
  - Signal Line: {{ macd.signal }}
  - Histogram: {{ macd.histogram }}
  - Tín hiệu: {% if macd.histogram > 0 %}Bullish{% else %}Bearish{% endif %}
  {% else %}
  - Không có dữ liệu MACD
  {% endif %}

  **3. Bollinger Bands:**
  {% if bollinger %}
  - Upper: {{ bollinger.upper }}
  - Middle: {{ bollinger.middle }}
  - Lower: {{ bollinger.lower }}
  - Giá hiện tại: {{ bollinger.current_price }}
  {% else %}
  - Không có dữ liệu Bollinger Bands
  {% endif %}

  **4. Đường trung bình (SMA):**
  {% if sma %}
  - SMA 20: {{ sma.sma_20 }}
  - SMA 50: {{ sma.sma_50 }}
  - SMA 200: {{ sma.sma_200 }}
  {% else %}
  - Không có dữ liệu SMA
  {% endif %}

  **5. Khối lượng:**
  {% if volume_analysis %}
  - TB 20 phiên: {{ volume_analysis.avg_volume }}
  - Phiên hiện tại: {{ volume_analysis.current_volume }}
  - Tỷ lệ: {{ volume_analysis.ratio }}x
  {% else %}
  - Không có dữ liệu khối lượng
  {% endif %}

  **Yêu cầu phân tích:**
  1. Tổng hợp tín hiệu từ tất cả chỉ báo (bullish/bearish/neutral)
  2. Xác định mức hỗ trợ và kháng cự gần nhất dựa trên Bollinger & SMA
  3. Đánh giá động lượng (momentum) và xu hướng ngắn hạn
  4. Mức độ tin cậy của tín hiệu (cao/trung bình/thấp)

  **Quy tắc bắt buộc:**
  - Chỉ phân tích dữ liệu được cung cấp — KHÔNG tự tạo số liệu
  - Ghi rõ khi các chỉ báo mâu thuẫn nhau
  - Thông tin này chỉ mang tính tham khảo, không phải khuyến nghị đầu tư
