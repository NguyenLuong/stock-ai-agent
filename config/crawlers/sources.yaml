# Crawler source definitions — URLs, schedules, rate limits
# Category: "macro" = macroeconomic news, "stock" = stock market news

sources:
  vietstock:
    base_url: "https://vietstock.vn"
    schedule: "0 6,12,18 * * *"   # 3x daily
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - url: "https://vietstock.vn/761/kinh-te/vi-mo.rss"
        category: "macro"
      - url: "https://vietstock.vn/768/kinh-te/kinh-te-dau-tu.rss"
        category: "macro"
      - url: "https://vietstock.vn/830/chung-khoan/co-phieu.rss"
        category: "stock"
      - url: "https://vietstock.vn/772/the-gioi/tai-chinh-quoc-te.rss"
        category: "macro"
      - url: "https://vietstock.vn/757/tai-chinh/ngan-hang.rss"
        category: "macro"

  cafef:
    base_url: "https://cafef.vn"
    schedule: "0 6,12,18 * * *"
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - url: "https://cafef.vn/tai-chinh-quoc-te.rss"
        category: "macro"
      - url: "https://cafef.vn/thi-truong-chung-khoan.rss"
        category: "stock"
      - url: "https://cafef.vn/tai-chinh-ngan-hang.rss"
        category: "macro"
      - url: "https://cafef.vn/vi-mo-dau-tu.rss"
        category: "macro"
      - url: "https://cafef.vn/thi-truong.rss"
        category: "stock"

  vneconomy:
    base_url: "https://vneconomy.vn"
    schedule: "0 7,13,19 * * *"
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - url: "https://vneconomy.vn/chung-khoan.rss"
        category: "stock"
      - url: "https://vneconomy.vn/thi-truong.rss"
        category: "stock"
      - url: "https://vneconomy.vn/tai-chinh.rss"
        category: "macro"
      - url: "https://vneconomy.vn/kinh-te-the-gioi.rss"
        category: "macro"
