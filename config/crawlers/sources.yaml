# Crawler source definitions — URLs, schedules, rate limits

sources:
  vietstock:
    base_url: "https://vietstock.vn"
    schedule: "0 6,12,18 * * *"   # 3x daily
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - "https://vietstock.vn/rss/tai-chinh.rss"
      - "https://vietstock.vn/rss/chung-khoan.rss"

  cafef:
    base_url: "https://cafef.vn"
    schedule: "0 6,12,18 * * *"
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - "https://cafef.vn/rss/trang-chu.rss"
      - "https://cafef.vn/rss/thi-truong-chung-khoan.rss"

  vneconomy:
    base_url: "https://vneconomy.vn"
    schedule: "0 7,13,19 * * *"
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - "https://vneconomy.vn/rss/chung-khoan.rss"

macro:
  gsovn:
    base_url: "https://www.gso.gov.vn"
    schedule: "0 8 * * 1"          # Weekly on Monday
    enabled: true

  sbv:
    base_url: "https://www.sbv.gov.vn"
    schedule: "0 8 * * 1"
    enabled: true
