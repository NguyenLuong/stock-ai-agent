# Crawler source definitions — URLs, schedules, rate limits

sources:
  vietstock:
    base_url: "https://vietstock.vn"
    schedule: "0 6,12,18 * * *"   # 3x daily
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - "https://vietstock.vn/rss/tai-chinh.rss"
      - "https://vietstock.vn/rss/chung-khoan.rss"

  cafef:
    base_url: "https://cafef.vn"
    schedule: "0 6,12,18 * * *"
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - "https://cafef.vn/rss/trang-chu.rss"
      - "https://cafef.vn/rss/thi-truong-chung-khoan.rss"

  vneconomy:
    base_url: "https://vneconomy.vn"
    schedule: "0 7,13,19 * * *"
    rate_limit_rps: 1
    enabled: true
    rss_feeds:
      - "https://vneconomy.vn/rss/chung-khoan.rss"

macro:
  vn_index:
    source: "vnstock"
    symbol: "VNINDEX"
    indicators: ["vn_index_close", "vn_index_volume"]
    enabled: true
    schedule: "30 9,14 * * 1-5"    # Twice daily on trading days (after open + mid-session)

  exchange_rate:
    source: "vnstock"
    symbol: "USDVND"
    indicators: ["usd_vnd_rate"]
    fallback_source: "sbv.gov.vn"
    enabled: true
    schedule: "0 9 * * 1-5"        # Daily on weekdays

  foreign_flow:
    source: "vnstock"
    indicators: ["foreign_net_flow"]
    enabled: true
    schedule: "0 16 * * 1-5"       # Daily after market close

  sbv_interest_rate:
    source: "sbv.gov.vn"
    base_url: "https://www.sbv.gov.vn"
    indicators: ["sbv_interest_rate"]
    rate_limit_rps: 1
    enabled: true
    schedule: "0 8 * * 1"          # Weekly on Monday (SBV updates infrequently)
