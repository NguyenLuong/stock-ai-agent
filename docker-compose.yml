version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-prefect-db.sh:/docker-entrypoint-initdb.d/init-prefect-db.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/prefect_db
    ports:
      - "127.0.0.1:4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      APP_URL: http://app:8000
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: services/app/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      CONFIG_DIR: /app/config
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

volumes:
  postgres_data:
